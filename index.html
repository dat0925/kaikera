<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Kaikera</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f8fafc;--bg2:#f1f5f9;--bg3:#e2e8f0;
  --surface:#ffffff;--border:#e2e8f0;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --accent:#4f46e5;--accent2:#3730a3;--accent-bg:#eef2ff;
  --p1:#ef4444;--p2:#f97316;--p3:#3b82f6;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#ef4444;--red-bg:#fef2f2;
  --font:'DM Sans',system-ui,sans-serif;
  --sidebar-w:220px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-dark]{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;
  --surface:#1a2030;--border:#2a3347;
  --text:#f0f4ff;--text2:#8892a8;--text3:#5a6480;
  --accent-bg:#1e1b4b;--green-bg:#052e16;--red-bg:#450a0a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;-webkit-text-size-adjust:100%;overflow:hidden}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit;touch-action:manipulation;-webkit-tap-highlight-color:rgba(0,0,0,0)}
button:active{opacity:.75}
input,select,textarea{font-family:var(--font);color:inherit;font-size:16px;box-sizing:border-box}

/* ===== LAYOUT ===== */
.layout{display:flex;height:100vh;height:100dvh;overflow:hidden}

/* Sidebar */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .25s ease;
  z-index:100;
}
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.15)}
  .sidebar-overlay{display:block!important}
}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}
.sidebar-head{padding:14px 12px 8px;display:flex;align-items:center;gap:8px}
.logo{width:28px;height:28px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:16px;height:16px;fill:#fff}
.logo-name{font-size:15px;font-weight:700;color:var(--text)}
.sidebar-nav{flex:1;overflow-y:auto;padding:4px 8px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;font-size:13.5px;color:var(--text2);transition:background .15s,color .15s;user-select:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.on{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.nav-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);padding:10px 8px 3px}
.badge{margin-left:auto;font-size:11px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:10px}
.sidebar-foot{padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0}
.sidebar-account{display:flex;align-items:center;gap:8px;padding:6px 4px}
.sidebar-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;background:var(--accent);overflow:hidden}
.sidebar-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sidebar-info{flex:1;min-width:0}
.sidebar-email{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-status{font-size:10px;color:var(--text3)}
.auth-btn{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);color:var(--text3);cursor:pointer;flex-shrink:0}
.auth-btn.logout{color:var(--p1);border-color:rgba(239,68,68,.3)}
.acct-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.topbar-menu{display:none;width:32px;height:32px;border-radius:6px;align-items:center;justify-content:center;color:var(--text2)}
@media(max-width:768px){.topbar-menu{display:flex}}
.topbar-title{font-size:15px;font-weight:700;flex:1}
.topbar-actions{display:flex;gap:6px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
@media(max-width:768px){.content{padding:12px;padding-bottom:calc(12px + var(--safe-bottom))}}

/* ===== CARDS ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:12px}
.section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}

/* ===== BALANCE SUMMARY ===== */
.balance-hero{background:var(--accent);border-radius:16px;padding:20px;color:#fff;position:relative;overflow:hidden}
.balance-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.balance-hero::after{content:'';position:absolute;bottom:-20px;left:20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.05)}
.balance-label{font-size:11px;font-weight:600;opacity:.7;text-transform:uppercase;letter-spacing:.05em}
.balance-amount{font-size:32px;font-weight:700;margin:4px 0;letter-spacing:-.5px}
.balance-sub{display:flex;gap:16px;margin-top:8px}
.balance-sub-item{font-size:12px;opacity:.8}
.balance-sub-item span{font-weight:700;opacity:1}

/* ===== ACCOUNT LIST ===== */
.acct-list{display:flex;flex-direction:column;gap:8px}
.acct-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:background .15s}
.acct-item:hover{background:var(--bg2)}
.acct-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.acct-name{font-size:13.5px;font-weight:600;color:var(--text)}
.acct-type{font-size:11px;color:var(--text3)}
.acct-balance{margin-left:auto;text-align:right}
.acct-balance-num{font-size:15px;font-weight:700;color:var(--text)}
.acct-balance-num.negative{color:var(--red)}

/* ===== TRANSACTION LIST ===== */
.tx-list{display:flex;flex-direction:column;gap:1px}
.tx-date-header{font-size:11px;font-weight:600;color:var(--text3);padding:10px 0 4px;text-transform:uppercase;letter-spacing:.04em}
.tx-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border-radius:8px;cursor:pointer;transition:background .15s}
.tx-item:hover{background:var(--bg2)}
.tx-cat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-memo{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-sub{font-size:11px;color:var(--text3)}
.tx-amount{font-size:14px;font-weight:700;flex-shrink:0;text-align:right}
.tx-amount.income{color:var(--green)}
.tx-amount.expense{color:var(--text)}
.tx-amount.transfer{color:var(--accent)}

/* ===== FORM ===== */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.flabel{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.finput{border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:15px;background:var(--bg);color:var(--text);width:100%;transition:border-color .15s;-webkit-appearance:none}
.finput:focus{outline:none;border-color:var(--accent)}
.fselect{border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:15px;background:var(--bg);color:var(--text);width:100%;-webkit-appearance:none;appearance:none}
.fselect:focus{outline:none;border-color:var(--accent)}
.type-tabs{display:flex;gap:4px;background:var(--bg2);padding:3px;border-radius:8px;margin-bottom:4px}
.type-tab{flex:1;padding:7px;border-radius:6px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--text2);transition:all .15s}
.type-tab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.type-tab.income.on{color:var(--green)}
.type-tab.expense.on{color:var(--red)}
.type-tab.transfer.on{color:var(--accent)}

/* ===== CATEGORY GRID ===== */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
@media(min-width:400px){.cat-grid{grid-template-columns:repeat(5,1fr)}}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:8px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);transition:all .15s}
.cat-btn:hover{border-color:var(--accent);background:var(--accent-bg)}
.cat-btn.on{border-color:var(--accent);background:var(--accent-bg)}
.cat-btn-icon{font-size:20px}
.cat-btn-name{font-size:10px;color:var(--text2);text-align:center;line-height:1.2}

/* ===== MODAL ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none}
.overlay.open{opacity:1;pointer-events:auto}
@media(min-width:480px){.overlay{align-items:center}}
.modal{background:var(--surface);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s}
@media(min-width:480px){.modal{border-radius:16px;transform:translateY(0)}}
.overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}

/* ===== AMOUNT INPUT ===== */
.amount-display{font-size:36px;font-weight:700;text-align:center;padding:16px 0;letter-spacing:-1px;min-height:64px;color:var(--text)}
.amount-display.income{color:var(--green)}
.amount-display.expense{color:var(--red)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.numpad-btn{padding:14px;border-radius:10px;font-size:18px;font-weight:600;text-align:center;cursor:pointer;background:var(--bg2);color:var(--text);border:none;transition:background .1s;-webkit-tap-highlight-color:rgba(0,0,0,0)}
.numpad-btn:active{background:var(--bg3)}
.numpad-btn.del{background:var(--bg3)}
.numpad-btn.confirm{background:var(--accent);color:#fff}

/* ===== CHARTS ===== */
.chart-bar-wrap{display:flex;flex-direction:column;gap:8px}
.chart-bar-item{display:flex;align-items:center;gap:8px}
.chart-bar-label{font-size:12px;color:var(--text2);width:70px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-bar-track{flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.chart-bar-amount{font-size:12px;font-weight:600;color:var(--text);width:70px;text-align:right;flex-shrink:0}

/* ===== GRID SUMMARY ===== */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.summary-cell{background:var(--bg2);border-radius:10px;padding:12px}
.summary-cell-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.summary-cell-value{font-size:18px;font-weight:700}
.summary-cell-value.income{color:var(--green)}
.summary-cell-value.expense{color:var(--red)}

/* ===== LOGIN ===== */
.login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:9999;flex-direction:column;gap:24px}
.login-logo{width:56px;height:56px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.login-title{font-size:22px;font-weight:700;color:var(--text)}
.login-sub{font-size:13px;color:var(--text3)}
.google-btn{display:flex;align-items:center;gap:10px;padding:12px 24px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-size:15px;font-weight:600;cursor:pointer;color:var(--text);transition:background .15s}
.google-btn:hover{background:var(--bg2)}

/* ===== TOAST ===== */
.toast-wrap{position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{background:#1e293b;color:#fff;padding:9px 16px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;animation:toastIn .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.2)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== MOBILE NAV ===== */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 0;padding-bottom:calc(8px + var(--safe-bottom));z-index:98}
@media(max-width:768px){.mobile-nav{display:flex}}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;padding:4px 0;transition:color .15s}
.mobile-nav-item.on{color:var(--accent)}
.mobile-nav-icon{font-size:20px;line-height:1}
@media(max-width:768px){.content{padding-bottom:calc(72px + var(--safe-bottom))}}

/* ===== MISC ===== */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.month-nav{display:flex;align-items:center;gap:8px}
.month-nav-btn{padding:6px 10px;border-radius:7px;background:var(--bg2);border:1px solid var(--border);font-size:13px;cursor:pointer;color:var(--text)}
.month-label{font-size:14px;font-weight:700;flex:1;text-align:center}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.pill.income{background:var(--green-bg);color:var(--green)}
.pill.expense{background:var(--red-bg);color:var(--red)}
.pill.transfer{background:var(--accent-bg);color:var(--accent)}
hr.divider{border:none;border-top:1px solid var(--border);margin:8px 0}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap">
  <div class="login-logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
  </div>
  <div class="login-title">Kaikera</div>

    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Googleでログイン
  </button>
</div>

<!-- Layout -->
<div class="layout" id="app" style="display:none">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.67 0-1.72 1.39-2.84 3.11-3.21V4h2.67v1.95c1.86.45 2.79 1.86 2.85 3.39H14.3c-.05-1.11-.64-1.87-2.22-1.87-1.5 0-2.4.68-2.4 1.64 0 .84.65 1.39 2.67 1.91s4.18 1.39 4.18 3.91c-.01 1.83-1.38 2.83-3.12 3.16z"/></svg>
      </div>
      <span class="logo-name">Kaikera</span>
      <button id="dark-toggle" style="margin-left:auto;font-size:16px;padding:4px;border-radius:6px;color:var(--text3)" title="ダークモード">🌙</button>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <div class="nav-label">メニュー</div>

        <div class="sidebar-avatar" id="sb-avatar">?</div>
        <div class="sidebar-info">
          <div class="sidebar-email" id="sb-email">-</div>
          <div class="sidebar-status">ログイン中</div>
        </div>
        <button class="auth-btn logout" id="logout-btn">ログアウト</button>
      </div>

  </aside>

  <main class="main">

      <button class="topbar-menu" id="menu-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- Mobile Nav -->
<nav class="mobile-nav" id="mobile-nav">
  <div class="mobile-nav-item on" data-view="home"><div class="mobile-nav-icon">🏠</div>ホーム</div>
  <div class="mobile-nav-item" data-view="input"><div class="mobile-nav-icon">➕</div>入力</div>
  <div class="mobile-nav-item" data-view="history"><div class="mobile-nav-icon">📋</div>履歴</div>
  <div class="mobile-nav-item" data-view="accounts"><div class="mobile-nav-icon">💳</div>口座</div>
  <div class="mobile-nav-item" data-view="stats"><div class="mobile-nav-icon">📊</div>集計</div>
</nav>

<div class="toast-wrap" id="toast-wrap"></div>

<script>

// ===== UTILS =====
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtAmt(n,sign=false){
  const s=Math.abs(n).toLocaleString('ja-JP');
  if(sign)return (n>=0?'+':'-')+'¥'+s;
  return '¥'+s;
}
function fmtDate(d){
  const dt=new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}(${['日','月','火','水','木','金','土'][dt.getDay()]})`;
}
function toast(msg,dur=2500){
  const w=document.getElementById('toast-wrap');
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  w.appendChild(t);setTimeout(()=>t.remove(),dur);
}

// ===== DB =====
async function loadAll(){
  if(!S.user)return;
  const uid=S.user.id;
  const [r1,r2,r3]=await Promise.all([
    SB.from('kk_accounts').select('*').eq('user_id',uid).order('sort_order'),
    SB.from('kk_transactions').select('*').eq('user_id',uid).order('date',{ascending:false}).order('created_at',{ascending:false}),
    SB.from('kk_categories').select('*').eq('user_id',uid).order('sort_order'),
  ]);
  S.accounts=r1.data||[];
  S.transactions=r2.data||[];
  S.categories=r3.data&&r3.data.length?r3.data:DEFAULT_CATS;
}

function getCats(type){
  if(type==='transfer')return [];
  return S.categories.filter(c=>c.type===type||!c.type||(type&&!c.type));
}
function getCat(id){return S.categories.find(c=>c.id===id)||DEFAULT_CATS.find(c=>c.id===id)||{name:'その他',icon:'📦',color:'#6b7280'}}
function getAcct(id){return S.accounts.find(a=>a.id===id)}

// ===== MONTH TRANSACTIONS =====
function monthTxs(month=S.month){
  return S.transactions.filter(t=>t.date&&t.date.startsWith(month));
}
function totalIncome(txs){return txs.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0)}
function totalExpense(txs){return txs.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0)}
function totalBalance(){return S.accounts.reduce((s,a)=>s+Number(a.balance||0),0)}

  if(S.view==='home')el.innerHTML=renderHome();
  else if(S.view==='input')el.innerHTML=renderInput();
  else if(S.view==='history')el.innerHTML=renderHistory();
  else if(S.view==='accounts')el.innerHTML=renderAccounts();

}

function renderTxItem(t){
  const cat=getCat(t.category_id);
  const acct=getAcct(t.account_id);
  const sign=t.type==='income'?'+':t.type==='transfer'?'⇄':'-';
  return `<div class="tx-item" data-txid="${t.id}">
    <div class="tx-cat-icon" style="background:${esc(cat.color||'#eef2ff')}20">${esc(cat.icon||'📦')}</div>
    <div class="tx-info">
      <div class="tx-memo">${esc(t.memo||cat.name)}</div>
      <div class="tx-sub">${fmtDate(t.date)}${acct?' · '+esc(acct.name):''}</div>
    </div>
    <div class="tx-amount ${t.type}">${sign}${fmtAmt(t.amount)}</div>
  </div>`;
}

// ===== HISTORY =====
function renderHistory(){
  const txs=monthTxs();
  const income=totalIncome(txs);
  const expense=totalExpense(txs);

  // 日付でグループ
  const grouped={};
  txs.forEach(t=>{
    if(!grouped[t.date])grouped[t.date]=[];
    grouped[t.date].push(t);
  });
  const dates=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

  return `
  <div class="summary-grid">
    <div class="summary-cell">
      <div class="summary-cell-label">収入</div>
      <div class="summary-cell-value income">${fmtAmt(income)}</div>
    </div>
    <div class="summary-cell">
      <div class="summary-cell-label">支出</div>
      <div class="summary-cell-value expense">${fmtAmt(expense)}</div>
    </div>
  </div>

  ${dates.length?dates.map(date=>`
  <div>
    <div class="tx-date-header">${fmtDate(date)} <span style="margin-left:6px;font-weight:400;color:var(--text3)">${fmtAmt(grouped[date].reduce((s,t)=>t.type==='expense'?s-t.amount:t.type==='income'?s+Number(t.amount):s,0),true)}</span></div>
    <div class="tx-list">${grouped[date].map(t=>renderTxItem(t)).join('')}</div>
  </div>`).join('')
  :`<div class="empty">この月の取引はありません</div>`}`;
}

// ===== STATS =====
function renderStats(){
  const txs=monthTxs();
  const expense=txs.filter(t=>t.type==='expense');

  // カテゴリ別集計
  const catMap={};
  expense.forEach(t=>{
    const id=t.category_id||'c_other_exp';
    if(!catMap[id])catMap[id]=0;
    catMap[id]+=Number(t.amount);
  });
  const catList=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxAmt=catList[0]?.[1]||1;
  const totalExp=totalExpense(txs);
  const totalInc=totalIncome(txs);

  // 月別サマリー（過去6ヶ月）
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date();d.setMonth(d.getMonth()-i);
    const m=d.toISOString().slice(0,7);
    const t=S.transactions.filter(x=>x.date&&x.date.startsWith(m));
    months.push({month:m,income:totalIncome(t),expense:totalExpense(t)});
  }

  return `
  <div class="month-nav" style="margin-bottom:4px">
    <button class="month-nav-btn" id="prev-month">‹</button>
    <span class="month-label">${S.month.replace('-','年')}月</span>
    <button class="month-nav-btn" id="next-month">›</button>
  </div>

  <div class="summary-grid">
    <div class="summary-cell">
      <div class="summary-cell-label">収入</div>
      <div class="summary-cell-value income">${fmtAmt(totalInc)}</div>
    </div>
    <div class="summary-cell">
      <div class="summary-cell-label">支出</div>
      <div class="summary-cell-value expense">${fmtAmt(totalExp)}</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">支出カテゴリ</div>
    ${catList.length?`<div class="chart-bar-wrap">
      ${catList.map(([id,amt])=>{
        const cat=getCat(id);
        const pct=Math.round(amt/maxAmt*100);
        return `<div class="chart-bar-item">
          <div class="chart-bar-label">${esc(cat.icon)} ${esc(cat.name)}</div>
          <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${pct}%;background:${esc(cat.color||'var(--accent)')}"></div></div>
          <div class="chart-bar-amount">${fmtAmt(amt)}</div>
        </div>`;
      }).join('')}
    </div>`:`<div class="empty">この月の支出はありません</div>`}
  </div>

  <div class="card">
    <div class="card-title">過去6ヶ月の収支</div>
    <div class="chart-bar-wrap">
      ${months.map(m=>{
        const maxM=Math.max(...months.map(x=>Math.max(x.income,x.expense)),1);
        return `<div style="margin-bottom:6px">
          <div style="font-size:11px;color:var(--text3);margin-bottom:3px">${m.month.replace('-','年')}月</div>
          <div style="display:flex;gap:4px;align-items:center">
            <div style="flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${Math.round(m.income/maxM*100)}%;background:var(--green);border-radius:3px"></div>
            </div>
            <span style="font-size:10px;color:var(--green);width:60px;text-align:right">${fmtAmt(m.income)}</span>
          </div>
          <div style="display:flex;gap:4px;align-items:center;margin-top:2px">
            <div style="flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${Math.round(m.expense/maxM*100)}%;background:var(--red);border-radius:3px"></div>
            </div>
            <span style="font-size:10px;color:var(--red);width:60px;text-align:right">${fmtAmt(m.expense)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ===== AFTER RENDER =====
function afterRender(){
  // View links
  document.querySelectorAll('[data-view]').forEach(el=>{
    el.onclick=()=>{S.view=el.dataset.view;render();closeSidebar();};
  });

  if(S.view==='input'){
    // Type tabs
    document.querySelectorAll('[data-itype]').forEach(el=>{
      el.onclick=()=>{S.inputType=el.dataset.itype;S.inputCategoryId=null;render();};
    });
    // Numpad
    document.querySelectorAll('[data-key]').forEach(btn=>{
      btn.onclick=()=>{
        const k=btn.dataset.key;
        if(k==='⌫'){S.inputAmount=S.inputAmount.slice(0,-1);}
        else if(k==='000'){S.inputAmount=(S.inputAmount||'')+'000';}
        else{S.inputAmount=(S.inputAmount||'')+k;}
        // 上限
        if(Number(S.inputAmount)>99999999)S.inputAmount='99999999';
        const d=document.getElementById('amount-display');
        if(d){d.textContent='¥'+(S.inputAmount?Number(S.inputAmount).toLocaleString('ja-JP'):'0');}
      };
    });
    // Category
    document.querySelectorAll('[data-catid]').forEach(btn=>{
      btn.onclick=()=>{
        S.inputCategoryId=btn.dataset.catid;
        document.querySelectorAll('[data-catid]').forEach(b=>b.classList.toggle('on',b.dataset.catid===S.inputCategoryId));
      };
    });
    // Date
    const dateEl=document.getElementById('input-date');
    if(dateEl)dateEl.onchange=()=>S.inputDate=dateEl.value;
    // Account
    const acctEl=document.getElementById('input-account');
    if(acctEl)acctEl.onchange=()=>S.inputAccountId=acctEl.value;
    const toEl=document.getElementById('input-to-account');
    if(toEl)toEl.onchange=()=>S.inputToAccountId=toEl.value;
    // Memo
    const memoEl=document.getElementById('input-memo');
    if(memoEl)memoEl.oninput=()=>S.inputMemo=memoEl.value;
    // Save
    const saveBtn=document.getElementById('save-tx-btn');
    if(saveBtn)saveBtn.onclick=saveTx;
  }

  if(S.view==='history'||S.view==='stats'){
    const prev=document.getElementById('prev-month');
    const next=document.getElementById('next-month');
    if(prev)prev.onclick=()=>{
      const d=new Date(S.month+'-01');d.setMonth(d.getMonth()-1);
      S.month=d.toISOString().slice(0,7);render();
    };
    if(next)next.onclick=()=>{
      const d=new Date(S.month+'-01');d.setMonth(d.getMonth()+1);
      S.month=d.toISOString().slice(0,7);render();
    };
  }

  if(S.view==='accounts'){
    const addBtn=document.getElementById('add-acct-btn');
    if(addBtn)addBtn.onclick=showAddAccountModal;
    document.querySelectorAll('[data-del-acct]').forEach(btn=>{
      btn.onclick=e=>{e.stopPropagation();deleteAccount(btn.dataset.delAcct);};
    });
    document.querySelectorAll('[data-acctid]').forEach(el=>{
      el.onclick=e=>{if(!e.target.dataset.delAcct)showEditAccountModal(el.dataset.acctid);};
    });
  }

  // Tx click
  document.querySelectorAll('[data-txid]').forEach(el=>{
    el.onclick=()=>showTxDetail(el.dataset.txid);
  });

  // Home view links
  document.querySelectorAll('[data-view]').forEach(el=>{
    el.onclick=()=>{S.view=el.dataset.view;render();closeSidebar();};
  });
}

// ===== SAVE TRANSACTION =====
async function saveTx(){
  if(!S.inputAmount||S.inputAmount==='0'){toast('金額を入力してください');return;}
  if(!S.inputAccountId){toast('アカウントを選択してください');return;}
  if(S.inputType==='transfer'&&!S.inputToAccountId){toast('振替先を選択してください');return;}
  if(S.inputType==='transfer'&&S.inputAccountId===S.inputToAccountId){toast('振替元と振替先が同じです');return;}

  const amount=Number(S.inputAmount);
  const tx={
    id:uid(),
    user_id:S.user.id,
    type:S.inputType,
    amount,
    category_id:S.inputCategoryId||null,
    account_id:S.inputAccountId,
    to_account_id:S.inputToAccountId||null,
    memo:S.inputMemo||'',
    date:S.inputDate,
    created_at:new Date().toISOString(),
  };

  const {error}=await SB.from('kk_transactions').insert(tx);
  if(error){toast('保存に失敗しました: '+error.message);return;}

  // 残高更新
  const acct=getAcct(S.inputAccountId);
  if(acct){
    let newBal=Number(acct.balance||0);
    if(tx.type==='expense')newBal-=amount;
    else if(tx.type==='income')newBal+=amount;
    else if(tx.type==='transfer')newBal-=amount;
    await SB.from('kk_accounts').update({balance:newBal}).eq('id',acct.id);
  }
  if(tx.type==='transfer'&&S.inputToAccountId){
    const toAcct=getAcct(S.inputToAccountId);
    if(toAcct){
      const newBal=Number(toAcct.balance||0)+amount;
      await SB.from('kk_accounts').update({balance:newBal}).eq('id',toAcct.id);
    }
  }

  toast('保存しました');
  // リセット
  S.inputAmount='';S.inputMemo='';S.inputCategoryId=null;
  await loadAll();
  render();
}

// ===== ACCOUNT MODAL =====
function showAddAccountModal(){
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">アカウントを追加</div>
    <div class="fg"><label class="flabel">名前</label><input class="finput" id="an-name" placeholder="例: Suica, PayPay, 三菱UFJ…"></div>
    <div class="fg"><label class="flabel">種別</label>
      <select class="fselect" id="an-type">
        ${ACCT_TYPES.map(t=>`<option value="${t.value}">${t.icon} ${t.label}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><label class="flabel">初期残高</label><input class="finput" id="an-balance" type="number" placeholder="0" value="0"></div>
    <div class="fg"><label class="flabel">カラー</label><input class="finput" id="an-color" type="color" value="#eef2ff" style="height:40px;padding:4px"></div>
    <div class="modal-foot">
      <button class="btn" id="an-cancel">キャンセル</button>
      <button class="btn btn-primary" id="an-ok">追加</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('open'));
  ov.querySelector('#an-cancel').onclick=()=>ov.remove();
  ov.querySelector('#an-ok').onclick=async()=>{
    const name=ov.querySelector('#an-name').value.trim();
    if(!name){toast('名前を入力してください');return;}
    const acct={
      id:uid(),user_id:S.user.id,
      name,
      type:ov.querySelector('#an-type').value,
      balance:Number(ov.querySelector('#an-balance').value)||0,
      color:ov.querySelector('#an-color').value,
      sort_order:S.accounts.length,
      created_at:new Date().toISOString(),
    };
    const{error}=await SB.from('kk_accounts').insert(acct);
    if(error){toast('追加に失敗しました');return;}
    ov.remove();await loadAll();render();toast('追加しました');
  };
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  setTimeout(()=>ov.querySelector('#an-name').focus(),100);
}

function showEditAccountModal(acctId){
  const acct=getAcct(acctId);if(!acct)return;
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">残高を編集</div>
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">${esc(acct.name)}</div>
    <div class="fg"><label class="flabel">現在の残高</label><input class="finput" id="eb-balance" type="number" value="${acct.balance||0}"></div>
    <div class="modal-foot">
      <button class="btn" id="eb-cancel">キャンセル</button>
      <button class="btn btn-primary" id="eb-ok">保存</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('open'));
  ov.querySelector('#eb-cancel').onclick=()=>ov.remove();
  ov.querySelector('#eb-ok').onclick=async()=>{
    const bal=Number(ov.querySelector('#eb-balance').value)||0;
    await SB.from('kk_accounts').update({balance:bal}).eq('id',acctId);
    ov.remove();await loadAll();render();toast('更新しました');
  };
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
}

async function deleteAccount(acctId){
  if(!confirm('このアカウントを削除しますか？\n※ 関連する取引は削除されません'))return;
  await SB.from('kk_accounts').delete().eq('id',acctId);
  await loadAll();render();toast('削除しました');
}

// ===== TX DETAIL =====
function showTxDetail(txId){
  const tx=S.transactions.find(t=>t.id===txId);if(!tx)return;
  const cat=getCat(tx.category_id);
  const acct=getAcct(tx.account_id);
  const toAcct=tx.to_account_id?getAcct(tx.to_account_id):null;
  const sign=tx.type==='income'?'+':tx.type==='transfer'?'⇄':'-';
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal">
    <div class="modal-handle"></div>
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:36px;margin-bottom:4px">${esc(cat.icon)}</div>
      <div class="tx-amount ${tx.type}" style="font-size:28px;font-weight:700">${sign}${fmtAmt(tx.amount)}</div>
      <div style="font-size:13px;color:var(--text3);margin-top:4px">${esc(cat.name)} · ${fmtDate(tx.date)}</div>
    </div>
    <hr class="divider">
    ${tx.memo?`<div class="fg"><label class="flabel">メモ</label><div style="font-size:14px;padding:4px 0">${esc(tx.memo)}</div></div>`:''}
    <div class="fg"><label class="flabel">アカウント</label><div style="font-size:14px;padding:4px 0">${acct?esc(acct.name):'不明'}</div></div>
    ${toAcct?`<div class="fg"><label class="flabel">振替先</label><div style="font-size:14px;padding:4px 0">${esc(toAcct.name)}</div></div>`:''}
    <div class="modal-foot" style="justify-content:space-between">
      <button class="btn" style="color:var(--red);border-color:rgba(239,68,68,.3)" id="del-tx-btn">削除</button>
      <button class="btn" id="close-tx-btn">閉じる</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('open'));
  ov.querySelector('#close-tx-btn').onclick=()=>ov.remove();
  ov.querySelector('#del-tx-btn').onclick=async()=>{
    if(!confirm('この取引を削除しますか？'))return;
    // 残高を戻す
    if(acct){
      let newBal=Number(acct.balance||0);
      if(tx.type==='expense')newBal+=Number(tx.amount);
      else if(tx.type==='income')newBal-=Number(tx.amount);
      else if(tx.type==='transfer')newBal+=Number(tx.amount);
      await SB.from('kk_accounts').update({balance:newBal}).eq('id',acct.id);
    }
    if(tx.type==='transfer'&&toAcct){
      const newBal=Number(toAcct.balance||0)-Number(tx.amount);
      await SB.from('kk_accounts').update({balance:newBal}).eq('id',toAcct.id);
    }
    await SB.from('kk_transactions').delete().eq('id',txId);
    ov.remove();await loadAll();render();toast('削除しました');
  };
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
}

// ===== SIDEBAR =====
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').style.display='none';
}
document.getElementById('menu-btn').onclick=()=>{
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebar-overlay');
  const open=sb.classList.toggle('open');
  ov.style.display=open?'block':'none';
};
document.getElementById('sidebar-overlay').onclick=closeSidebar;

// ===== DARK MODE =====
document.getElementById('dark-toggle').onclick=()=>{
  const isDark=document.documentElement.hasAttribute('data-dark');
  if(isDark)document.documentElement.removeAttribute('data-dark');
  else document.documentElement.setAttribute('data-dark','');
  localStorage.setItem('kk-dark',isDark?'':'1');
};
if(localStorage.getItem('kk-dark')==='1')document.documentElement.setAttribute('data-dark','');

// ===== AUTH =====
document.getElementById('login-btn').onclick=async()=>{
  await SB.auth.signInWithOAuth({provider:'google',options:{redirectTo:'https://dat0925.github.io/kaikera/'}});
};
document.getElementById('logout-btn').onclick=async()=>{
  await SB.auth.signOut();location.reload();
};

function showApp(user){
  S.user=user;
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('mobile-nav').style.display='flex';
  const av=document.getElementById('sb-avatar');
  const em=document.getElementById('sb-email');
  const img=user.user_metadata?.avatar_url;
  if(img)av.innerHTML=`<img src="${img}">`;
  else av.textContent=(user.email||'?').charAt(0).toUpperCase();
  if(em)em.textContent=user.email||'';
  loadAll().then(()=>render());
}

SB.auth.getSession().then(({data:{session}})=>{
  if(session?.user)showApp(session.user);
});
SB.auth.onAuthStateChange((_,session)=>{
  if(session?.user&&!S.user)showApp(session.user);
});
</script>
