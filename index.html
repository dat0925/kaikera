<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Kaikera</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f13">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f6f6f8;--bg2:#ededf0;--bg3:#e0e0e4;
  --surface:#ffffff;--border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.04);
  --text:#0d0d12;--text2:#52525c;--text3:#a0a0aa;
  --accent:#5b50f0;--accent2:#4338ca;--accent-bg:#f0effe;
  --green:#0fa96e;--green-bg:#ecfdf5;--green-soft:rgba(15,169,110,.12);
  --red:#e5484d;--red-bg:#fff1f1;--red-soft:rgba(229,72,77,.12);
  --blue:#3b82f6;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 16px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.06);
  --font:'Inter',system-ui,sans-serif;
  --r:14px;--r-sm:8px;--r-lg:20px;
  --sidebar-w:240px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-dark]{
  --bg:#0d0d12;--bg2:#141419;--bg3:#1c1c24;
  --surface:#18181f;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.03);
  --text:#f2f2f8;--text2:#8888a0;--text3:#48485a;
  --accent:#6d62f5;--accent2:#5b50f0;--accent-bg:#1a1840;
  --green-bg:#0a1f14;--red-bg:#1f0a0a;
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);
  --shadow:0 4px 16px rgba(0,0,0,.4);
  --shadow-lg:0 12px 40px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;-webkit-text-size-adjust:100%;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit;touch-action:manipulation}
button:active{opacity:.8}
input,select{font-family:var(--font);color:var(--text);font-size:16px;background:transparent;border:none;outline:none}

.app{display:flex;height:100%;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1)}
@media(max-width:768px){.sidebar{position:fixed;inset:0 auto 0 0;height:100%;transform:translateX(-100%);box-shadow:var(--shadow-lg)}.sidebar.open{transform:none}}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:199;opacity:0;pointer-events:none;transition:opacity .3s}
@media(max-width:768px){.sb-overlay{display:block}.sb-overlay.show{opacity:1;pointer-events:auto}}
.sb-head{padding:20px 16px 8px;display:flex;align-items:center;gap:10px;padding-top:calc(20px + var(--safe-top))}
.logo-mark{width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark img{width:100%;height:100%;object-fit:contain;border-radius:6px}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-.3px}
.dark-btn{margin-left:auto;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;background:var(--bg2)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:1px}
.nav-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:12px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;width:100%;text-align:left}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.on{background:var(--accent-bg);color:var(--accent);font-weight:600}
.ni-icon{width:18px;height:18px;flex-shrink:0;opacity:.5;display:flex;align-items:center;justify-content:center}
.nav-item.on .ni-icon{opacity:1}
.ni-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sb-foot{padding:10px;padding-bottom:calc(10px + var(--safe-bottom));border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:9px;padding:8px}
.user-av{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.user-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.user-em{font-size:11px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.logout-btn{font-size:11px;color:var(--red);padding:3px 8px;border-radius:6px;border:1px solid var(--red-soft);background:var(--red-bg);font-weight:500;flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:calc(54px + var(--safe-top));padding-top:var(--safe-top);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
@media(max-width:768px){.topbar{padding:0 16px;padding-top:var(--safe-top)}}
.menu-btn{width:34px;height:34px;border-radius:9px;display:none;align-items:center;justify-content:center;color:var(--text2);background:var(--bg2);flex-shrink:0}
@media(max-width:768px){.menu-btn{display:flex}}
.menu-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.tb-title{font-size:15px;font-weight:700;letter-spacing:-.3px;flex:1}
.content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
@media(max-width:768px){.content{padding:14px;padding-bottom:calc(76px + var(--safe-bottom))}.content.view-input{padding:0!important;padding-bottom:0!important}}

/* MOBILE NAV */
.mnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:6px 0;padding-bottom:calc(6px + var(--safe-bottom));z-index:100}
@media(max-width:768px){.mnav{display:flex}}
.mn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.mn-ic{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:background .15s}
.mn-item.on .mn-ic{background:var(--accent-bg)}
.mn-ic svg{width:18px;height:18px;stroke:var(--text3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.mn-item.on .mn-ic svg{stroke:var(--accent)}
.mn-lb{font-size:10px;font-weight:500;color:var(--text3);transition:color .15s}
.mn-item.on .mn-lb{color:var(--accent)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s;font-family:var(--font)}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(91,80,240,.2)}
.btn-primary:hover{background:var(--accent2)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}

/* HERO */
.hero{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);border-radius:var(--r-lg);padding:22px 20px;color:#fff;position:relative;overflow:hidden;box-shadow:0 6px 20px rgba(91,80,240,.28)}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero::after{content:'';position:absolute;bottom:-30px;left:-10px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-label{font-size:11px;font-weight:600;opacity:.6;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.hero-amt{font-size:34px;font-weight:800;letter-spacing:-1.5px;line-height:1;margin-bottom:16px}
.hero-stats{display:flex;border-top:1px solid rgba(255,255,255,.15);padding-top:14px}
.hs{flex:1;display:flex;flex-direction:column;gap:2px;padding:0 4px}
.hs+.hs{border-left:1px solid rgba(255,255,255,.15);padding-left:12px;margin-left:8px}
.hs-label{font-size:10px;opacity:.55;font-weight:500}
.hs-value{font-size:13px;font-weight:700}

/* SECTION */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3)}
.sec-link{font-size:12px;font-weight:600;color:var(--accent);cursor:pointer}

/* ACCOUNT CARDS */
.acct-list{display:flex;flex-direction:column;gap:6px}
.acct-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:box-shadow .15s,border-color .15s;box-shadow:var(--shadow-sm)}
.acct-card:hover{box-shadow:var(--shadow);border-color:rgba(91,80,240,.2)}
.acct-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.acct-name{font-size:14px;font-weight:600;letter-spacing:-.2px}
.acct-type{font-size:11px;color:var(--text3);margin-top:1px}
.acct-bal{margin-left:auto;font-size:15px;font-weight:700;letter-spacing:-.4px;text-align:right}
.acct-bal.neg{color:var(--red)}
.acct-del{opacity:0;transition:opacity .15s;color:var(--text3);font-size:11px;padding:4px 7px;border-radius:6px;background:var(--bg2);margin-left:8px}
.acct-card:hover .acct-del{opacity:1}

/* TX LIST */
.tx-group{display:flex;flex-direction:column;gap:4px}
.tx-date-row{display:flex;align-items:center;justify-content:space-between;padding:8px 2px 2px}
.tx-date-lbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.3px}
.tx-date-net{font-size:11px;font-weight:600}
.tx-item{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;transition:box-shadow .15s;box-shadow:var(--shadow-sm)}
.tx-item:hover{box-shadow:var(--shadow)}
.tx-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-body{flex:1;min-width:0}
.tx-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-sub{font-size:11px;color:var(--text3);margin-top:1px}
.tx-amt{font-size:13.5px;font-weight:700;letter-spacing:-.3px;flex-shrink:0}
.tx-amt.income{color:var(--green)}
.tx-amt.transfer{color:var(--blue)}

/* SUMMARY */
.sum-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sum-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow-sm)}
.sum-cell-lbl{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.sum-dot{width:6px;height:6px;border-radius:50%}
.sum-cell-val{font-size:20px;font-weight:800;letter-spacing:-.8px}
.sum-cell-val.income{color:var(--green)}
.sum-cell-val.expense{color:var(--red)}

/* INPUT */
.type-seg{display:flex;gap:0;background:var(--bg2);border-radius:10px;padding:3px;width:100%;flex-shrink:0}
.tsb{flex:1;padding:9px 0;border-radius:8px;font-size:13.5px;font-weight:600;text-align:center;cursor:pointer;color:var(--text2);transition:all .2s;white-space:nowrap}
.tsb.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
.tsb.on.expense{color:var(--red)}
.tsb.on.income{color:var(--green)}
.tsb.on.transfer{color:var(--blue)}

/* ── Mobile input layout: flex column, fixed bottom ── */
@media(max-width:768px){
  .content.view-input{padding:0;gap:0;overflow:hidden;display:flex;flex-direction:column}
  .input-scroll{flex:1;overflow-y:auto;padding:12px 14px 8px;display:flex;flex-direction:column;gap:10px}
  .input-fixed{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border)}
}
@media(min-width:769px){
  .amt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
}

/* Amount display */
.amt-display{font-size:44px;font-weight:800;text-align:center;padding:14px 20px 8px;letter-spacing:-2px;color:var(--text);transition:color .2s;flex-shrink:0}
.amt-display.expense{color:var(--red)}
.amt-display.income{color:var(--green)}
.amt-display.transfer{color:var(--blue)}

/* Activity quick-entry bar */
.act-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;flex-shrink:0}
.act-bar::-webkit-scrollbar{display:none}
.act-chip{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:7px 10px;min-width:56px;cursor:pointer;flex-shrink:0;transition:all .15s}
.act-chip:active{transform:scale(.93);background:var(--bg2)}
.act-chip.on{border-color:var(--accent);background:var(--accent-bg)}
.act-ic{font-size:18px;line-height:1}
.act-lbl{font-size:9px;font-weight:600;color:var(--text2);white-space:nowrap}
.act-amt{font-size:8px;color:var(--text3)}
.act-add{background:var(--bg2);border-style:dashed;color:var(--text3)}

/* Category grid - 4 columns */
.cat-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:10px;box-shadow:var(--shadow-sm)}
.cat-sec-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border-radius:10px;cursor:pointer;border:1.5px solid transparent;background:var(--bg2);transition:all .15s;min-height:56px;justify-content:center}
.cat-btn.on{border-color:var(--accent);background:var(--accent-bg)}
.cat-btn:active{transform:scale(.93)}
.cat-ic{font-size:20px;line-height:1}
.cat-nm{font-size:9px;color:var(--text2);text-align:center;font-weight:500;line-height:1.2}
.cat-btn.on .cat-nm{color:var(--accent);font-weight:700}

/* Fixed bottom: form + numpad + save */
.input-form-rows{background:var(--bg2);border-bottom:1px solid var(--border)}
.ifr{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:10px;cursor:pointer;min-height:44px}
.ifr:last-child{border-bottom:none}
.ifr-label{font-size:11px;font-weight:700;color:var(--text3);width:44px;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px}
.ifr-val{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.ifr-val.placeholder{color:var(--text3)}
.ifr input,.ifr select{flex:1;font-size:14px;font-weight:500;color:var(--text);background:transparent;border:none;outline:none;-webkit-appearance:none;appearance:none;font-family:var(--font)}
.ifr input::placeholder{color:var(--text3)}
.ifr-arrow{font-size:12px;color:var(--text3)}

/* Numpad - 4 columns */
.numpad{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border)}
.np{padding:15px 8px;font-size:19px;font-weight:600;text-align:center;cursor:pointer;color:var(--text);border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .1s;-webkit-tap-highlight-color:transparent;min-height:50px;display:flex;align-items:center;justify-content:center}
.np:nth-child(4n){border-right:none}
.np:nth-last-child(-n+4){border-bottom:none}
.np:active{background:var(--bg2)}
.np.del{color:var(--text2);font-size:15px}
.np.clear{color:var(--red);font-size:13px;font-weight:700}
.np.calc-btn{color:var(--accent);font-size:13px;font-weight:700}
.np.save-np{background:var(--accent);color:#fff;font-size:13px;font-weight:800;letter-spacing:-.2px}
.np.save-np:active{background:var(--accent2)}

/* Desktop form card */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
.form-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border2)}
.form-row:last-child{border-bottom:none}
.fr-label{font-size:12px;font-weight:600;color:var(--text3);width:68px;flex-shrink:0}
.fr-input{flex:1;font-size:15px;font-weight:500;background:transparent;color:var(--text);-webkit-appearance:none;appearance:none}
.fr-input::placeholder{color:var(--text3)}

.save-btn{width:100%;padding:15px;border-radius:var(--r);font-size:15px;font-weight:700;background:var(--accent);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(91,80,240,.25);transition:all .2s;font-family:var(--font);letter-spacing:-.2px}
.save-btn:active{transform:scale(.98);background:var(--accent2)}

/* MONTH CTRL */
.month-ctrl{display:flex;align-items:center;gap:8px}
.mon-btn{width:32px;height:32px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text2);flex-shrink:0}
.mon-label{font-size:14px;font-weight:700;flex:1;text-align:center;letter-spacing:-.3px}

/* BAR CHART */
.bar-wrap{display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:9px}
.bar-label{font-size:11.5px;color:var(--text2);width:62px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-val{font-size:11.5px;font-weight:600;color:var(--text);width:62px;text-align:right;flex-shrink:0;letter-spacing:-.3px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:auto}
@media(min-width:480px){.overlay{align-items:center}}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;transform:translateY(12px);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-lg)}
@media(min-width:480px){.modal{border-radius:20px;transform:translateY(0)}}
.overlay.open .modal{transform:none}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--bg3);margin:0 auto 18px}
.modal-title{font-size:16px;font-weight:700;letter-spacing:-.3px;margin-bottom:16px}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.flabel{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.finput{border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-size:15px;width:100%;background:var(--bg2);color:var(--text);transition:border-color .15s;-webkit-appearance:none;font-family:var(--font)}
.finput:focus{outline:none;border-color:var(--accent)}
.fselect{border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-size:15px;width:100%;background:var(--bg2);color:var(--text);-webkit-appearance:none;appearance:none;cursor:pointer;font-family:var(--font)}

/* LOGIN */
.login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:9999;flex-direction:column;gap:18px;padding:24px}
.login-logo{width:80px;height:80px;display:flex;align-items:center;justify-content:center}
.login-logo img{width:100%;height:100%;object-fit:contain;border-radius:16px}
.login-title{font-size:26px;font-weight:800;letter-spacing:-.8px}
.login-sub{font-size:13px;color:var(--text3);margin-top:-6px}
.google-btn{display:flex;align-items:center;gap:10px;padding:14px 28px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);font-size:15px;font-weight:600;cursor:pointer;color:var(--text);box-shadow:var(--shadow-sm);font-family:var(--font)}
.google-btn:hover{box-shadow:var(--shadow)}

/* TOAST */
.toast-wrap{position:fixed;bottom:calc(22px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
.toast{background:rgba(13,13,18,.92);backdrop-filter:blur(16px);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;animation:ti .2s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 16px rgba(0,0,0,.3)}
@keyframes ti{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px;line-height:1.8}
.card-inner{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow-sm)}
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-logo"><img src="icon-192.png" alt="Kaikera"></div>
  <div class="login-title">Kaikera</div>
  <div class="login-sub">収支・資産管理をシンプルに</div>
  <button class="google-btn" id="login-btn">
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Googleでログイン
  </button>
</div>

<div class="app" id="app" style="display:none">
  <div class="sb-overlay" id="sb-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="logo-mark"><img src="icon-192.png" alt="Kaikera"></div>
      <span class="logo-text">Kaikera</span>
      <button class="dark-btn" id="dark-toggle">🌙</button>
    </div>
    <nav class="sb-nav">
      <div class="nav-section">メニュー</div>
      <button class="nav-item on" data-view="home"><span class="ni-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>ホーム</button>
      <button class="nav-item" data-view="input"><span class="ni-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></span>収支入力</button>
      <button class="nav-item" data-view="history"><span class="ni-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>履歴</button>
      <button class="nav-item" data-view="accounts"><span class="ni-icon"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></span>アカウント</button>
      <button class="nav-item" data-view="stats"><span class="ni-icon"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>集計</button>
    </nav>
    <div class="sb-foot">
      <div class="user-row">
        <div class="user-av" id="sb-av">?</div>
        <div class="user-em" id="sb-em">-</div>
        <button class="logout-btn" id="logout-btn">ログアウト</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menu-btn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="tb-title" id="tb-title">ホーム</div>
      <div id="tb-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<nav class="mnav" id="mnav">
  <div class="mn-item on" data-view="home"><div class="mn-ic"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="mn-lb">ホーム</div></div>
  <div class="mn-item" data-view="input"><div class="mn-ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div><div class="mn-lb">入力</div></div>
  <div class="mn-item" data-view="history"><div class="mn-ic"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div><div class="mn-lb">履歴</div></div>
  <div class="mn-item" data-view="accounts"><div class="mn-ic"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div><div class="mn-lb">口座</div></div>
  <div class="mn-item" data-view="stats"><div class="mn-ic"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><div class="mn-lb">集計</div></div>
</nav>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const SUPABASE_URL='https://sfhtvtcmgueystyuhzvd.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmaHR2dGNtZ3VleXN0eXVoenZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Nzg0MDYsImV4cCI6MjA5MDM1NDQwNn0.qsON2xYdDf22LtU-jGd96Ubaif0xzzswC9KnzWndKNw';
const KAIKERA_URL='https://dat0925.github.io/kaikera/';
const SB=supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{flowType:'pkce',redirectTo:KAIKERA_URL}});

const S={view:'home',user:null,accounts:[],transactions:[],categories:[],activities:[],month:new Date().toISOString().slice(0,7),inputType:'expense',inputAmount:'',inputCategoryId:null,inputAccountId:null,inputToAccountId:null,inputMemo:'',inputDate:new Date().toISOString().slice(0,10),calcMode:false,calcAccum:0};

function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtAmt(n,sign=false){const s=Math.abs(Number(n)).toLocaleString('ja-JP');if(sign)return(Number(n)>=0?'+':'-')+'¥'+s;return'¥'+s;}
function fmtDate(d){const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}(${['日','月','火','水','木','金','土'][dt.getDay()]})`;}
function toast(msg,dur=2500){const w=document.getElementById('toast-wrap');const t=document.createElement('div');t.className='toast';t.textContent=msg;w.appendChild(t);setTimeout(()=>t.remove(),dur);}

const DEFAULT_CATS=[
  {id:'c_food',name:'食費',icon:'🍚',color:'#f97316',type:'expense'},{id:'c_eat',name:'外食',icon:'🍜',color:'#ef4444',type:'expense'},
  {id:'c_drink',name:'飲み物',icon:'☕',color:'#8b5cf6',type:'expense'},{id:'c_snack',name:'お菓子',icon:'🍪',color:'#ec4899',type:'expense'},
  {id:'c_transport',name:'交通',icon:'🚃',color:'#3b82f6',type:'expense'},{id:'c_util',name:'光熱費',icon:'💡',color:'#eab308',type:'expense'},
  {id:'c_health',name:'医療',icon:'💊',color:'#10b981',type:'expense'},{id:'c_daily',name:'日用品',icon:'🧴',color:'#06b6d4',type:'expense'},
  {id:'c_clothes',name:'衣服',icon:'👗',color:'#f43f5e',type:'expense'},{id:'c_enjoy',name:'娯楽',icon:'🎮',color:'#7c3aed',type:'expense'},
  {id:'c_beauty',name:'美容',icon:'💄',color:'#db2777',type:'expense'},{id:'c_edu',name:'教育',icon:'📚',color:'#0284c7',type:'expense'},
  {id:'c_child',name:'子供',icon:'🧒',color:'#16a34a',type:'expense'},{id:'c_pet',name:'ペット',icon:'🐾',color:'#92400e',type:'expense'},
  {id:'c_other_exp',name:'その他',icon:'📦',color:'#6b7280',type:'expense'},
  {id:'c_salary',name:'給与',icon:'💰',color:'#16a34a',type:'income'},{id:'c_bonus',name:'賞与',icon:'🎁',color:'#d97706',type:'income'},
  {id:'c_invest',name:'投資',icon:'📈',color:'#0ea5e9',type:'income'},{id:'c_other_inc',name:'その他収入',icon:'💵',color:'#4ade80',type:'income'},
];
const ACCT_TYPES=[
  {value:'cash',label:'現金',icon:'💴'},{value:'ic_card',label:'ICカード',icon:'🚃'},
  {value:'qr_pay',label:'QR決済',icon:'📱'},{value:'credit',label:'クレジット',icon:'💳'},
  {value:'bank',label:'銀行',icon:'🏦'},{value:'invest',label:'投資',icon:'📈'},
  {value:'insurance',label:'保険・積立',icon:'🛡️'},{value:'other',label:'その他',icon:'💼'},
];

async function loadAll(){
  if(!S.user)return;
  const uid=S.user.id;
  const[r1,r2,r3]=await Promise.all([
    SB.from('kk_accounts').select('*').eq('user_id',uid).order('sort_order'),
    SB.from('kk_transactions').select('*').eq('user_id',uid).order('date',{ascending:false}).order('created_at',{ascending:false}),
    SB.from('kk_categories').select('*').eq('user_id',uid).order('sort_order'),
  ]);
  S.accounts=r1.data||[];S.transactions=r2.data||[];
  S.categories=r3.data&&r3.data.length?r3.data:DEFAULT_CATS;
  try{
    const r4=await SB.from('kk_activities').select('*').eq('user_id',uid).order('sort_order');
    S.activities=r4.data||[];
  }catch(e){S.activities=[];}
}
function getCats(type){return type==='transfer'?[]:S.categories.filter(c=>c.type===type);}
function getCat(id){return S.categories.find(c=>c.id===id)||DEFAULT_CATS.find(c=>c.id===id)||{name:'その他',icon:'📦',color:'#6b7280'}}
function getAcct(id){return S.accounts.find(a=>a.id===id)}
function monthTxs(m=S.month){return S.transactions.filter(t=>t.date&&t.date.startsWith(m))}
function totalIncome(txs){return txs.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0)}
function totalExpense(txs){return txs.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0)}
function totalBalance(){return S.accounts.reduce((s,a)=>s+Number(a.balance||0),0)}

function render(){
  document.querySelectorAll('[data-view]').forEach(el=>el.classList.toggle('on',el.dataset.view===S.view));
  const titles={home:'ホーム',input:'収支入力',history:'履歴',accounts:'アカウント',stats:'集計'};
  document.getElementById('tb-title').textContent=titles[S.view]||'Kaikera';
  const acts=document.getElementById('tb-actions');
  acts.innerHTML=S.view==='accounts'?'<button class="btn btn-primary btn-sm" id="add-acct-btn">＋ 追加</button>':'';
  const el=document.getElementById('content');
  el.classList.toggle('view-input',S.view==='input');
  if(S.view==='home')el.innerHTML=renderHome();
  else if(S.view==='input')el.innerHTML=renderInput();
  else if(S.view==='history')el.innerHTML=renderHistory();
  else if(S.view==='accounts')el.innerHTML=renderAccounts();
  else if(S.view==='stats')el.innerHTML=renderStats();
  afterRender();
}

function renderHome(){
  const txs=monthTxs(),income=totalIncome(txs),expense=totalExpense(txs),balance=totalBalance(),net=income-expense;
  const now=new Date(),mn=`${now.getMonth()+1}月`,recent=S.transactions.slice(0,5);
  return`
  <div class="hero">
    <div class="hero-label">総資産</div>
    <div class="hero-amt">${fmtAmt(balance)}</div>
    <div class="hero-stats">
      <div class="hs"><div class="hs-label">${mn}収入</div><div class="hs-value">${fmtAmt(income)}</div></div>
      <div class="hs"><div class="hs-label">${mn}支出</div><div class="hs-value">${fmtAmt(expense)}</div></div>
      <div class="hs"><div class="hs-label">収支</div><div class="hs-value">${fmtAmt(net,true)}</div></div>
    </div>
  </div>
  <div>
    <div class="sec-head"><div class="sec-title">アカウント</div><div class="sec-link" data-view="accounts">すべて →</div></div>
    ${S.accounts.length?`<div class="acct-list">${S.accounts.slice(0,4).map(a=>{
      const at=ACCT_TYPES.find(t=>t.value===a.type)||{icon:'💴',label:'その他'};
      return`<div class="acct-card"><div class="acct-ic" style="background:${esc(a.color||'#eef2ff')}22">${esc(at.icon)}</div><div style="flex:1;min-width:0"><div class="acct-name">${esc(a.name)}</div><div class="acct-type">${esc(at.label)}</div></div><div class="acct-bal ${Number(a.balance)<0?'neg':''}">${fmtAmt(a.balance||0)}</div></div>`;
    }).join('')}</div>`:`<div class="empty">アカウントがありません<br><button class="btn btn-primary" style="margin-top:10px" data-view="accounts">追加する</button></div>`}
  </div>
  <div>
    <div class="sec-head"><div class="sec-title">最近の取引</div><div class="sec-link" data-view="history">すべて →</div></div>
    ${recent.length?`<div class="tx-group">${recent.map(renderTxItem).join('')}</div>`:`<div class="empty">取引がありません</div>`}
  </div>`;
}

function renderTxItem(t){
  const cat=getCat(t.category_id),acct=getAcct(t.account_id);
  const sign=t.type==='income'?'+':t.type==='transfer'?'⇄':'-';
  return`<div class="tx-item" data-txid="${t.id}">
    <div class="tx-ic" style="background:${esc(cat.color||'#6b7280')}18">${esc(cat.icon||'📦')}</div>
    <div class="tx-body"><div class="tx-name">${esc(t.memo||cat.name)}</div><div class="tx-sub">${fmtDate(t.date)}${acct?' · '+esc(acct.name):''}</div></div>
    <div class="tx-amt ${t.type}">${sign}${fmtAmt(t.amount)}</div>
  </div>`;
}

function fmtDateShort(d){const dt=new Date(d+'T00:00:00');const today=new Date().toISOString().slice(0,10);const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);if(d===today)return'今日';if(d===yest)return'昨日';return`${dt.getMonth()+1}/${dt.getDate()}(${['日','月','火','水','木','金','土'][dt.getDay()]})`;}

function renderInput(){
  const cats=getCats(S.inputType),accts=S.accounts;
  const da=S.inputAmount?Number(S.inputAmount).toLocaleString('ja-JP'):'0';
  const selAcct=accts.find(a=>a.id===S.inputAccountId);
  const selToAcct=accts.find(a=>a.id===S.inputToAccountId);
  const isMobile=window.innerWidth<=768;

  // アクティビティバー (共通)
  const actBar=S.activities.length?`<div class="act-bar">${S.activities.slice(0,8).map(a=>`<button class="act-chip" data-actid="${a.id}"><div class="act-ic">${esc(getCat(a.category_id).icon)}</div><div class="act-lbl">${esc(a.name)}</div><div class="act-amt">${a.amount?fmtAmt(a.amount):'¥-'}</div></button>`).join('')}<button class="act-chip act-add" id="act-add-btn"><div class="act-ic">＋</div><div class="act-lbl">登録</div></button></div>`
  :`<div class="act-bar"><button class="act-chip act-add" id="act-add-btn"><div class="act-ic">＋</div><div class="act-lbl" style="white-space:normal;text-align:center">よく使う支出を<br>登録</div></button></div>`;

  // カテゴリグリッド (4列)
  const catGrid=S.inputType!=='transfer'?`<div class="cat-wrap"><div class="cat-sec-lbl">カテゴリ</div><div class="cat-grid">${cats.map(c=>`<button class="cat-btn ${S.inputCategoryId===c.id?'on':''}" data-catid="${c.id}"><span class="cat-ic">${esc(c.icon)}</span><span class="cat-nm">${esc(c.name)}</span></button>`).join('')}</div></div>`:'';

  // テンキー (4列: 数字 + 右列に機能キー)
  const numpad=`<div class="numpad">
    <button class="np" data-key="7">7</button><button class="np" data-key="8">8</button><button class="np" data-key="9">9</button><button class="np clear" data-key="C">C</button>
    <button class="np" data-key="4">4</button><button class="np" data-key="5">5</button><button class="np" data-key="6">6</button><button class="np del" data-key="⌫">⌫</button>
    <button class="np" data-key="1">1</button><button class="np" data-key="2">2</button><button class="np" data-key="3">3</button><button class="np calc-btn" data-key="CALC">${S.calcMode?'＝':'＋'}</button>
    <button class="np" data-key="000">000</button><button class="np" data-key="0">0</button><button class="np" data-key=".">.</button><button class="np save-np" id="save-tx-btn">保存</button>
  </div>`;

  if(isMobile){
    // フォーム行 (テンキー上固定)
    const formRows=`<div class="input-form-rows">
      <div class="ifr"><div class="ifr-label">日付</div><input class="fr-input" type="date" id="input-date" value="${S.inputDate}" style="flex:1;font-size:14px;font-weight:500"></div>
      <div class="ifr"><div class="ifr-label">${S.inputType==='transfer'?'振替元':'口座'}</div><select class="fr-input" id="input-account" style="flex:1;font-size:14px"><option value="">選択…</option>${accts.map(a=>`<option value="${a.id}" ${S.inputAccountId===a.id?'selected':''}>${esc(a.name)} (${fmtAmt(a.balance||0)})</option>`).join('')}</select></div>
      ${S.inputType==='transfer'?`<div class="ifr"><div class="ifr-label">振替先</div><select class="fr-input" id="input-to-account" style="flex:1;font-size:14px"><option value="">選択…</option>${accts.map(a=>`<option value="${a.id}" ${S.inputToAccountId===a.id?'selected':''}>${esc(a.name)} (${fmtAmt(a.balance||0)})</option>`).join('')}</select></div>`:''}
      <div class="ifr"><div class="ifr-label">メモ</div><input class="fr-input" id="input-memo" placeholder="任意" value="${esc(S.inputMemo)}" style="flex:1;font-size:14px"></div>
    </div>`;

    return`
  <div class="input-scroll">
    <div class="type-seg">
      <div class="tsb expense ${S.inputType==='expense'?'on':''}" data-itype="expense">支出</div>
      <div class="tsb income ${S.inputType==='income'?'on':''}" data-itype="income">収入</div>
      <div class="tsb transfer ${S.inputType==='transfer'?'on':''}" data-itype="transfer">振替</div>
    </div>
    <div class="amt-display ${S.inputType}" id="amt-display">${S.calcMode?`<span style="font-size:16px;opacity:.6">+</span> `:''}¥${da}</div>
    ${actBar}
    ${catGrid}
  </div>
  <div class="input-fixed">
    ${formRows}
    ${numpad}
  </div>`;
  }

  // Desktop layout (従来通り)
  return`
  <div class="type-seg">
    <div class="tsb expense ${S.inputType==='expense'?'on':''}" data-itype="expense">支出</div>
    <div class="tsb income ${S.inputType==='income'?'on':''}" data-itype="income">収入</div>
    <div class="tsb transfer ${S.inputType==='transfer'?'on':''}" data-itype="transfer">振替</div>
  </div>
  <div class="amt-card">
    <div class="amt-display ${S.inputType}" id="amt-display">¥${da}</div>
    ${numpad}
  </div>
  ${actBar}
  ${catGrid}
  <div class="form-card">
    <div class="form-row"><div class="fr-label">日付</div><input class="fr-input" type="date" id="input-date" value="${S.inputDate}"></div>
    <div class="form-row"><div class="fr-label">${S.inputType==='transfer'?'振替元':'口座'}</div><select class="fr-input" id="input-account"><option value="">選択…</option>${accts.map(a=>`<option value="${a.id}" ${S.inputAccountId===a.id?'selected':''}>${esc(a.name)} (${fmtAmt(a.balance||0)})</option>`).join('')}</select></div>
    ${S.inputType==='transfer'?`<div class="form-row"><div class="fr-label">振替先</div><select class="fr-input" id="input-to-account"><option value="">選択…</option>${accts.map(a=>`<option value="${a.id}" ${S.inputToAccountId===a.id?'selected':''}>${esc(a.name)} (${fmtAmt(a.balance||0)})</option>`).join('')}</select></div>`:''}
    <div class="form-row"><div class="fr-label">メモ</div><input class="fr-input" id="input-memo" placeholder="任意" value="${esc(S.inputMemo)}"></div>
  </div>
  <button class="save-btn" id="save-tx-btn">保存する</button>`;
}

function renderHistory(){
  const txs=monthTxs(),income=totalIncome(txs),expense=totalExpense(txs);
  const grouped={};txs.forEach(t=>{if(!grouped[t.date])grouped[t.date]=[];grouped[t.date].push(t);});
  const dates=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  return`
  <div class="month-ctrl"><button class="mon-btn" id="prev-month">‹</button><div class="mon-label">${S.month.replace('-','年')}月</div><button class="mon-btn" id="next-month">›</button></div>
  <div class="sum-row">
    <div class="sum-cell"><div class="sum-cell-lbl"><span class="sum-dot" style="background:var(--green)"></span>収入</div><div class="sum-cell-val income">${fmtAmt(income)}</div></div>
    <div class="sum-cell"><div class="sum-cell-lbl"><span class="sum-dot" style="background:var(--red)"></span>支出</div><div class="sum-cell-val expense">${fmtAmt(expense)}</div></div>
  </div>
  ${dates.length?dates.map(date=>{
    const dt=grouped[date],dn=dt.reduce((s,t)=>t.type==='expense'?s-Number(t.amount):t.type==='income'?s+Number(t.amount):s,0);
    return`<div class="tx-group"><div class="tx-date-row"><div class="tx-date-lbl">${fmtDate(date)}</div><div class="tx-date-net" style="color:${dn>=0?'var(--green)':'var(--red)'}">${fmtAmt(dn,true)}</div></div>${dt.map(renderTxItem).join('')}</div>`;
  }).join(''):`<div class="empty">この月の取引はありません</div>`}`;
}

function renderAccounts(){
  const total=totalBalance();
  return`
  <div class="hero"><div class="hero-label">総資産</div><div class="hero-amt">${fmtAmt(total)}</div><div class="hero-stats"><div class="hs"><div class="hs-label">口座数</div><div class="hs-value">${S.accounts.length}件</div></div></div></div>
  <div class="acct-list">${S.accounts.map(a=>{
    const at=ACCT_TYPES.find(t=>t.value===a.type)||{icon:'💴',label:'その他'};
    return`<div class="acct-card" data-acctid="${a.id}"><div class="acct-ic" style="background:${esc(a.color||'#eef2ff')}22">${esc(at.icon)}</div><div style="flex:1;min-width:0"><div class="acct-name">${esc(a.name)}</div><div class="acct-type">${esc(at.label)}</div></div><div class="acct-bal ${Number(a.balance)<0?'neg':''}">${fmtAmt(a.balance||0)}</div><button class="acct-del" data-del-acct="${a.id}">✕</button></div>`;
  }).join('')}</div>
  ${!S.accounts.length?`<div class="empty">アカウントがありません</div>`:''}`;
}

function renderStats(){
  const txs=monthTxs(),expense=txs.filter(t=>t.type==='expense');
  const catMap={};expense.forEach(t=>{const id=t.category_id||'c_other_exp';if(!catMap[id])catMap[id]=0;catMap[id]+=Number(t.amount);});
  const catList=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxAmt=catList[0]?.[1]||1,totalExp=totalExpense(txs),totalInc=totalIncome(txs);
  const months=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const m=d.toISOString().slice(0,7);const t=S.transactions.filter(x=>x.date&&x.date.startsWith(m));months.push({month:m,income:totalIncome(t),expense:totalExpense(t)});}
  const maxM=Math.max(...months.map(x=>Math.max(x.income,x.expense)),1);
  return`
  <div class="month-ctrl"><button class="mon-btn" id="prev-month">‹</button><div class="mon-label">${S.month.replace('-','年')}月</div><button class="mon-btn" id="next-month">›</button></div>
  <div class="sum-row">
    <div class="sum-cell"><div class="sum-cell-lbl"><span class="sum-dot" style="background:var(--green)"></span>収入</div><div class="sum-cell-val income">${fmtAmt(totalInc)}</div></div>
    <div class="sum-cell"><div class="sum-cell-lbl"><span class="sum-dot" style="background:var(--red)"></span>支出</div><div class="sum-cell-val expense">${fmtAmt(totalExp)}</div></div>
  </div>
  <div>
    <div class="sec-head"><div class="sec-title">支出カテゴリ</div></div>
    ${catList.length?`<div class="card-inner"><div class="bar-wrap">${catList.slice(0,8).map(([id,amt])=>{const cat=getCat(id);return`<div class="bar-row"><div class="bar-label">${esc(cat.icon)} ${esc(cat.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/maxAmt*100)}%;background:${esc(cat.color||'var(--accent)')}"></div></div><div class="bar-val">${fmtAmt(amt)}</div></div>`;}).join('')}</div></div>`:`<div class="empty">この月の支出はありません</div>`}
  </div>
  <div>
    <div class="sec-head"><div class="sec-title">過去6ヶ月</div></div>
    <div class="card-inner"><div class="bar-wrap">${months.map(m=>`<div style="margin-bottom:6px"><div style="font-size:11px;color:var(--text3);font-weight:600;margin-bottom:3px">${m.month.slice(5)}月</div><div class="bar-row" style="margin-bottom:2px"><div class="bar-label" style="font-size:10px;color:var(--green)">収入</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(m.income/maxM*100)}%;background:var(--green)"></div></div><div class="bar-val" style="font-size:10px;color:var(--green)">${fmtAmt(m.income)}</div></div><div class="bar-row"><div class="bar-label" style="font-size:10px;color:var(--red)">支出</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(m.expense/maxM*100)}%;background:var(--red)"></div></div><div class="bar-val" style="font-size:10px;color:var(--red)">${fmtAmt(m.expense)}</div></div></div>`).join('')}</div></div>
  </div>`;
}

function afterRender(){
  document.querySelectorAll('[data-view]').forEach(el=>{el.onclick=()=>{S.view=el.dataset.view;render();closeSidebar();};});
  if(S.view==='input'){
    document.querySelectorAll('[data-itype]').forEach(el=>{el.onclick=()=>{S.inputType=el.dataset.itype;S.inputCategoryId=null;S.calcMode=false;S.calcAccum=0;render();};});

    // テンキー: 4列対応 (C=クリア, CALC=電卓モード)
    document.querySelectorAll('[data-key]').forEach(btn=>{
      btn.onclick=()=>{
        const k=btn.dataset.key;
        const updateDisp=()=>{const d=document.getElementById('amt-display');if(d){const n=S.inputAmount?Number(S.inputAmount).toLocaleString('ja-JP'):'0';d.innerHTML=S.calcMode?`<span style="font-size:16px;opacity:.6">+</span> ¥${n}`:`¥${n}`;}};
        if(k==='C'){S.inputAmount='';S.calcMode=false;S.calcAccum=0;updateDisp();return;}
        if(k==='⌫'){S.inputAmount=S.inputAmount.slice(0,-1);updateDisp();return;}
        if(k==='CALC'){
          if(!S.calcMode){S.calcAccum=Number(S.inputAmount)||0;S.inputAmount='';S.calcMode=true;}
          else{S.inputAmount=String(S.calcAccum+Number(S.inputAmount||0));S.calcMode=false;S.calcAccum=0;}
          updateDisp();return;
        }
        if(k==='000')S.inputAmount=(S.inputAmount||'')+'000';
        else S.inputAmount=(S.inputAmount||'')+k;
        if(Number(S.inputAmount)>99999999)S.inputAmount='99999999';
        updateDisp();
      };
    });

    document.querySelectorAll('[data-catid]').forEach(btn=>{btn.onclick=()=>{S.inputCategoryId=btn.dataset.catid;document.querySelectorAll('[data-catid]').forEach(b=>b.classList.toggle('on',b.dataset.catid===S.inputCategoryId));};});
    const di=document.getElementById('input-date');if(di)di.onchange=()=>S.inputDate=di.value;
    const ai=document.getElementById('input-account');if(ai)ai.onchange=()=>S.inputAccountId=ai.value;
    const ti=document.getElementById('input-to-account');if(ti)ti.onchange=()=>S.inputToAccountId=ti.value;
    const mi=document.getElementById('input-memo');if(mi)mi.oninput=()=>S.inputMemo=mi.value;
    const sb=document.getElementById('save-tx-btn');if(sb)sb.onclick=saveTx;

    // アクティビティ: タップで即入力
    document.querySelectorAll('[data-actid]').forEach(btn=>{
      btn.onclick=()=>{
        const act=S.activities.find(a=>a.id===btn.dataset.actid);
        if(!act)return;
        if(act.amount)S.inputAmount=String(act.amount);
        if(act.category_id)S.inputCategoryId=act.category_id;
        if(act.account_id)S.inputAccountId=act.account_id;
        S.inputType=act.type||'expense';
        S.calcMode=false;S.calcAccum=0;
        render();
      };
    });

    // アクティビティ登録ボタン
    const aab=document.getElementById('act-add-btn');
    if(aab)aab.onclick=()=>showAddActivityModal();
  }
  if(S.view==='history'||S.view==='stats'){
    const prev=document.getElementById('prev-month'),next=document.getElementById('next-month');
    if(prev)prev.onclick=()=>{const d=new Date(S.month+'-01');d.setMonth(d.getMonth()-1);S.month=d.toISOString().slice(0,7);render();};
    if(next)next.onclick=()=>{const d=new Date(S.month+'-01');d.setMonth(d.getMonth()+1);S.month=d.toISOString().slice(0,7);render();};
  }
  if(S.view==='accounts'){
    const ab=document.getElementById('add-acct-btn');if(ab)ab.onclick=showAddAccountModal;
    document.querySelectorAll('[data-del-acct]').forEach(btn=>{btn.onclick=e=>{e.stopPropagation();deleteAccount(btn.dataset.delAcct);};});
    document.querySelectorAll('[data-acctid]').forEach(el=>{el.onclick=e=>{if(!e.target.dataset.delAcct)showEditAccountModal(el.dataset.acctid);};});
  }
  document.querySelectorAll('[data-txid]').forEach(el=>{el.onclick=()=>showTxDetail(el.dataset.txid);});
}

async function saveTx(){
  if(!S.inputAmount||S.inputAmount==='0'){toast('金額を入力してください');return;}
  if(!S.inputAccountId){toast('口座を選択してください');return;}
  if(S.inputType==='transfer'&&!S.inputToAccountId){toast('振替先を選択してください');return;}
  if(S.inputType==='transfer'&&S.inputAccountId===S.inputToAccountId){toast('振替元と振替先が同じです');return;}
  const amount=Number(S.inputAmount);
  const tx={id:uid(),user_id:S.user.id,type:S.inputType,amount,category_id:S.inputCategoryId||null,account_id:S.inputAccountId,to_account_id:S.inputToAccountId||null,memo:S.inputMemo||'',date:S.inputDate,created_at:new Date().toISOString()};
  const{error}=await SB.from('kk_transactions').insert(tx);
  if(error){toast('保存に失敗しました');return;}
  const acct=getAcct(S.inputAccountId);
  if(acct){let nb=Number(acct.balance||0);if(tx.type==='expense')nb-=amount;else if(tx.type==='income')nb+=amount;else nb-=amount;await SB.from('kk_accounts').update({balance:nb}).eq('id',acct.id);}
  if(tx.type==='transfer'&&S.inputToAccountId){const ta=getAcct(S.inputToAccountId);if(ta)await SB.from('kk_accounts').update({balance:Number(ta.balance||0)+amount}).eq('id',ta.id);}
  toast('保存しました ✓');S.inputAmount='';S.inputMemo='';S.inputCategoryId=null;S.calcMode=false;S.calcAccum=0;await loadAll();render();
}

function showAddActivityModal(){
  const cats=S.categories.filter(c=>c.type===S.inputType);
  const accts=S.accounts;
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal"><div class="modal-handle"></div><div class="modal-title">クイック入力を登録</div>
    <div class="fg"><label class="flabel">名前</label><input class="finput" id="aa-name" placeholder="例: コンビニ, 電車…"></div>
    <div class="fg"><label class="flabel">タイプ</label><select class="fselect" id="aa-type"><option value="expense">支出</option><option value="income">収入</option></select></div>
    <div class="fg"><label class="flabel">カテゴリ</label><select class="fselect" id="aa-cat"><option value="">選択…</option>${S.categories.map(c=>`<option value="${c.id}" ${S.inputCategoryId===c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('')}</select></div>
    <div class="fg"><label class="flabel">口座</label><select class="fselect" id="aa-acct"><option value="">毎回選択</option>${accts.map(a=>`<option value="${a.id}" ${S.inputAccountId===a.id?'selected':''}>${a.name}</option>`).join('')}</select></div>
    <div class="fg"><label class="flabel">金額（任意）</label><input class="finput" id="aa-amt" type="number" placeholder="空白=毎回入力"></div>
    <div class="modal-foot"><button class="btn" id="aa-cancel">キャンセル</button><button class="btn btn-primary" id="aa-ok">登録</button></div>
  </div>`;
  document.body.appendChild(ov);requestAnimationFrame(()=>ov.classList.add('open'));
  ov.querySelector('#aa-cancel').onclick=()=>ov.remove();
  ov.querySelector('#aa-ok').onclick=async()=>{
    const name=ov.querySelector('#aa-name').value.trim();
    if(!name){toast('名前を入力してください');return;}
    const act={id:uid(),user_id:S.user.id,name,type:ov.querySelector('#aa-type').value,category_id:ov.querySelector('#aa-cat').value||null,account_id:ov.querySelector('#aa-acct').value||null,amount:ov.querySelector('#aa-amt').value?Number(ov.querySelector('#aa-amt').value):null,sort_order:S.activities.length};
    const{error}=await SB.from('kk_activities').insert(act);
    if(error){toast('登録に失敗しました');console.error(error);return;}
    toast('登録しました ✓');ov.remove();await loadAll();render();
  };
}

function showAddAccountModal(){
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal"><div class="modal-handle"></div><div class="modal-title">アカウントを追加</div><div class="fg"><label class="flabel">名前</label><input class="finput" id="an-name" placeholder="例: Suica, PayPay…"></div><div class="fg"><label class="flabel">種別</label><select class="fselect" id="an-type">${ACCT_TYPES.map(t=>`<option value="${t.value}">${t.icon} ${t.label}</option>`).join('')}</select></div><div class="fg"><label class="flabel">初期残高</label><input class="finput" id="an-bal" type="number" value="0"></div><div class="fg"><label class="flabel">カラー</label><input class="finput" id="an-color" type="color" value="#eef2ff" style="height:40px;padding:4px"></div><div class="modal-foot"><button class="btn" id="an-cancel">キャンセル</button><button class="btn btn-primary" id="an-ok">追加</button></div></div>`;
  document.body.appendChild(ov);requestAnimationFrame(()=>ov.classList.add('open'));
  ov.querySelector('#an-cancel').onclick=()=>ov.remove();
  ov.querySelector('#an-ok').onclick=async()=>{
    const name=ov.querySelector('#an-name').value.trim();if(!name){toast('名前を入力してください');return;}
    const{error}=await SB.from('kk_accounts').insert({id:uid(),user_id:S.user.id,name,type:ov.querySelector('#an-type').value,balance:Number(ov.querySelector('#an-bal').value)||0,color:ov.querySelector('#an-color').value,sort_order:S.accounts.length,created_at:new Date().toISOString()});
    if(error){toast('追加に失敗しました');return;}ov.remove();await loadAll();render();toast('追加しました');
  };
  ov.onclick=e=>{if(e.target===ov)ov.remove();};setTimeout(()=>ov.querySelector('#an-name').focus(),100);
}

function showEditAccountModal(id){
  const acct=getAcct(id);if(!acct)return;
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal"><div class="modal-handle"></div><div class="modal-title">${esc(acct.name)}</div><div class="fg"><label class="flabel">残高を修正</label><input class="finput" id="eb-bal" type="number" value="${acct.balance||0}"></div><div class="modal-foot"><button class="btn" id="eb-cancel">キャンセル</button><button class="btn btn-primary" id="eb-ok">保存</button></div></div>`;
  document.body.appendChild(ov);requestAnimationFrame(()=>ov.classList.add('open'));
  ov.querySelector('#eb-cancel').onclick=()=>ov.remove();
  ov.querySelector('#eb-ok').onclick=async()=>{await SB.from('kk_accounts').update({balance:Number(ov.querySelector('#eb-bal').value)||0}).eq('id',id);ov.remove();await loadAll();render();toast('更新しました');};
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
}

async function deleteAccount(id){
  if(!confirm('このアカウントを削除しますか？'))return;
  await SB.from('kk_accounts').delete().eq('id',id);await loadAll();render();toast('削除しました');
}

function showTxDetail(txId){
  const tx=S.transactions.find(t=>t.id===txId);if(!tx)return;
  const cat=getCat(tx.category_id),acct=getAcct(tx.account_id),toAcct=tx.to_account_id?getAcct(tx.to_account_id):null;
  const sign=tx.type==='income'?'+':tx.type==='transfer'?'⇄':'-';
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal"><div class="modal-handle"></div><div style="text-align:center;padding:8px 0 20px"><div style="font-size:40px;margin-bottom:8px">${esc(cat.icon)}</div><div class="tx-amt ${tx.type}" style="font-size:30px;font-weight:800;letter-spacing:-1px">${sign}${fmtAmt(tx.amount)}</div><div style="font-size:12px;color:var(--text3);margin-top:6px;font-weight:500">${esc(cat.name)} · ${fmtDate(tx.date)}</div></div><div style="background:var(--bg2);border-radius:12px;overflow:hidden">${tx.memo?`<div style="display:flex;padding:12px 14px;border-bottom:1px solid var(--border2)"><span style="font-size:11px;color:var(--text3);font-weight:600;width:60px;flex-shrink:0">メモ</span><span style="font-size:14px;font-weight:500">${esc(tx.memo)}</span></div>`:''}<div style="display:flex;padding:12px 14px${toAcct?';border-bottom:1px solid var(--border2)':''}"><span style="font-size:11px;color:var(--text3);font-weight:600;width:60px;flex-shrink:0">口座</span><span style="font-size:14px;font-weight:500">${acct?esc(acct.name):'不明'}</span></div>${toAcct?`<div style="display:flex;padding:12px 14px"><span style="font-size:11px;color:var(--text3);font-weight:600;width:60px;flex-shrink:0">振替先</span><span style="font-size:14px;font-weight:500">${esc(toAcct.name)}</span></div>`:''}</div><div class="modal-foot" style="justify-content:space-between"><button class="btn" style="color:var(--red);border-color:var(--red-soft);background:var(--red-bg)" id="del-tx">削除</button><button class="btn" id="close-tx">閉じる</button></div></div>`;
  document.body.appendChild(ov);requestAnimationFrame(()=>ov.classList.add('open'));
  ov.querySelector('#close-tx').onclick=()=>ov.remove();
  ov.querySelector('#del-tx').onclick=async()=>{
    if(!confirm('この取引を削除しますか？'))return;
    if(acct){let nb=Number(acct.balance||0);if(tx.type==='expense')nb+=Number(tx.amount);else if(tx.type==='income')nb-=Number(tx.amount);else nb+=Number(tx.amount);await SB.from('kk_accounts').update({balance:nb}).eq('id',acct.id);}
    if(tx.type==='transfer'&&toAcct)await SB.from('kk_accounts').update({balance:Number(toAcct.balance||0)-Number(tx.amount)}).eq('id',toAcct.id);
    await SB.from('kk_transactions').delete().eq('id',txId);ov.remove();await loadAll();render();toast('削除しました');
  };
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
}

function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-overlay').classList.remove('show');}
document.getElementById('menu-btn').onclick=()=>{const open=document.getElementById('sidebar').classList.toggle('open');document.getElementById('sb-overlay').classList.toggle('show',open);};
document.getElementById('sb-overlay').onclick=closeSidebar;
document.getElementById('dark-toggle').onclick=()=>{const d=document.documentElement.hasAttribute('data-dark');d?document.documentElement.removeAttribute('data-dark'):document.documentElement.setAttribute('data-dark','');localStorage.setItem('kk-dark',d?'':'1');};
if(localStorage.getItem('kk-dark')==='1')document.documentElement.setAttribute('data-dark','');

document.getElementById('login-btn').onclick=async()=>{await SB.auth.signInWithOAuth({provider:'google',options:{redirectTo:KAIKERA_URL}});};
document.getElementById('logout-btn').onclick=async()=>{await SB.auth.signOut();location.reload();};

function showApp(user){
  S.user=user;
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('mnav').style.display='flex';
  const av=document.getElementById('sb-av'),em=document.getElementById('sb-em');
  const img=user.user_metadata?.avatar_url;
  if(img)av.innerHTML=`<img src="${img}">`;else av.textContent=(user.email||'?').charAt(0).toUpperCase();
  if(em)em.textContent=user.email||'';
  loadAll().then(()=>render());
}
SB.auth.getSession().then(({data:{session}})=>{if(session?.user)showApp(session.user);});
SB.auth.onAuthStateChange((_,session)=>{if(session?.user&&!S.user)showApp(session.user);});
</script>
